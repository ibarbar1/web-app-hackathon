<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Movie Search</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <header class="hero">
    <div class="hero-inner">
      <h1 class="logo">
        <svg class="logo-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        MovieSearch
      </h1>
      <p class="tagline">Instant search across thousands of movies</p>
      <div class="search-wrapper">
        <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input
          type="text"
          id="search-input"
          placeholder="Search movies by title or description..."
          autocomplete="off"
          autofocus
        />
        <kbd class="search-shortcut">/</kbd>
      </div>
      <div class="filters">
        <select id="genre-filter">
          <option value="">All Genres</option>
        </select>
        <select id="sort-filter">
          <option value="">Relevance</option>
          <option value="popularity:desc">Most Popular</option>
          <option value="vote_average:desc">Highest Rated</option>
          <option value="release_year:desc">Newest First</option>
          <option value="release_year:asc">Oldest First</option>
        </select>
      </div>
    </div>
  </header>

  <main>
    <div class="results-meta" id="results-meta"></div>
    <div class="grid" id="results"></div>
    <nav class="pagination" id="pagination" hidden></nav>
    <div class="loading" id="loading" hidden>
      <div class="spinner"></div>
    </div>
    <div class="empty-state" id="empty-state" hidden>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9.172 16.172a4 4 0 015.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
      <p>No movies found</p>
      <span>Try a different search or adjust your filters</span>
    </div>
  </main>

  <aside class="chat-panel" id="chat-panel">
    <div class="chat-header">
      <div class="chat-header-title">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="18" height="18"><path d="M12 2a7 7 0 017 7c0 3-2 5.5-4 7l-3 3.5L9 16c-2-1.5-4-4-4-7a7 7 0 017-7z"/><circle cx="12" cy="9" r="1.5"/></svg>
        AI Recommender
      </div>
      <button class="chat-toggle" id="chat-toggle" aria-label="Toggle chat">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><polyline points="15 18 9 12 15 6"/></svg>
      </button>
    </div>
    <div class="chat-messages" id="chat-messages">
      <div class="chat-bubble ai">Hey! Tell me what kind of movie you're in the mood for and I'll find the best picks from our library.</div>
    </div>
    <form class="chat-input-form" id="chat-form">
      <input type="text" id="chat-input" placeholder="e.g. something like Inception but scarier..." autocomplete="off" />
      <button type="submit" id="chat-send" aria-label="Send">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="18" height="18"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
      </button>
    </form>
  </aside>

  <button class="chat-fab" id="chat-fab" aria-label="Open AI Recommender">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="24" height="24"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
  </button>

  <div class="modal-overlay" id="modal-overlay" hidden>
    <div class="modal" id="modal" role="dialog" aria-modal="true">
      <button class="modal-close" id="modal-close" aria-label="Close">&times;</button>
      <div class="modal-body" id="modal-body"></div>
    </div>
  </div>

  <script src="/app.js"></script>
</body>
</html>
